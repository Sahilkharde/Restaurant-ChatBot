services:
  # ── Backend (Node.js API) ──────────────────────────────────────────────────
  - type: web
    name: dinebot-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production

  # ── Frontend (pre-built Angular static files) ─────────────────────────────
  # The dist/ folder is committed to the repo so no Angular build is needed.
  # Render just installs `serve` and starts the static file server.
  - type: web
    name: dinebot-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install --omit=dev
    startCommand: npx serve -s dist/enoc-chatbot/browser -l $PORT
    envVars:
      - key: NODE_ENV
        value: production
